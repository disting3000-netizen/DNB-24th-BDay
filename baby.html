<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operation Baby Launcher</title>
  <link rel="stylesheet" href="baby/style.css">
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <p class="loading-screen__text">Loading Operation Baby Launcher...</p>
  </div>

  <div class="intro-overlay intro-overlay--hidden" id="intro-overlay">
    <div class="intro-box" id="intro-box">
      <p class="intro-text">
        <span id="intro-typewriter"></span><span id="intro-cursor" class="intro-cursor"></span>
      </p>
      <p class="intro-continue" id="intro-continue">&lt;click to continue&gt;</p>
    </div>
  </div>

  <div id="ui-overlay" class="ui-overlay ui-overlay--hidden">
    <header class="game-header">
      <h1 class="game-title">Operation Baby Launcher</h1>
      <p class="game-subtitle">Launch the baby safely into the pillow.</p>
      <p class="level-indicator" id="level-indicator">Level 1 / 5</p>
    </header>

    <div class="hud" id="drag-hud" hidden>
      <span id="power-readout">Power: 0</span>
      <span id="angle-readout">Angle: 0°</span>
    </div>

    <p class="commentary" id="commentary" aria-live="polite"></p>

    <div class="modal" id="result-modal" hidden>
      <h2 class="modal__title" id="result-title"></h2>
      <p class="modal__message" id="result-message"></p>
      <p class="modal__submessage" id="result-submessage"></p>
      <div class="modal__actions">
        <button class="btn" id="btn-retry" type="button" hidden>Retry</button>
        <button class="btn" id="btn-replay" type="button" hidden>Replay</button>
        <button class="btn btn--primary" id="btn-next" type="button" hidden>Next Level</button>
      </div>
    </div>
  </div>

  <canvas id="game-canvas" aria-label="Operation Baby Launcher game canvas"></canvas>

  <div class="victory-overlay victory-overlay--hidden" id="victory-overlay">
    <img
      class="victory-sticker"
      id="victory-sticker"
      src="stickers/images/Baby/baby_sticker.png"
      alt="Baby reward"
    >
    <button class="map-return" id="map-return" type="button">
      <span class="map-return__arrow" aria-hidden="true">→</span>
      <span>Click to go back to Map</span>
    </button>
  </div>

  <script src="audio/game-audio.js"></script>
  <script src="baby/script.js" defer></script>
</body>
</html>
